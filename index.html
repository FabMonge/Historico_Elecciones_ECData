<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECData - Histórico Electoral</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="top-legend" class="top-legend-container"></div>

    <div id="year-display" class="year-label">Cargando...</div>
    <div id="map"></div>

    <script>
        var map = L.map('map', {
            zoomControl: false, dragging: false, scrollWheelZoom: false,
            doubleClickZoom: false, touchZoom: false, attributionControl: false
        }).setView([-9.5, -78.5], 5.2);

        // DATA EXTENDIDA CON CANDIDATOS Y % (Simulacro 2021)
        const elecciones = {
            "2021 - 1ra Vuelta": {
                mapa: {
                    "AMAZONAS": "#ce1126", "ANCASH": "#ce1126", "APURIMAC": "#ce1126", "AREQUIPA": "#ce1126",
                    "AYACUCHO": "#ce1126", "CAJAMARCA": "#ce1126", "CUSCO": "#ce1126", "HUANCAVELICA": "#ce1126",
                    "HUANUCO": "#ce1126", "ICA": "#ff8c00", "JUNIN": "#ce1126", "LA LIBERTAD": "#0047ab",
                    "LAMBAYEQUE": "#ff8c00", "LIMA": "#e91e63", "LORETO": "#ff8c00", "MADRE DE DIOS": "#ce1126",
                    "MOQUEGUA": "#ce1126", "PASCO": "#ce1126", "PIURA": "#ff8c00", "PUNO": "#ce1126",
                    "SAN MARTIN": "#ce1126", "TACNA": "#ce1126", "TUMBES": "#ff8c00", "CALLAO": "#ff8c00",
                    "UCAYALI": "#ff8c00", "EXTRANJERO": "#00bfff"
                },
                top: [
                    { nombre: "Pedro Castillo", partido: "Perú Libre", pct: "18.9%", color: "#ce1126", foto: true },
                    { nombre: "Keiko Fujimori", partido: "Fuerza Popular", pct: "13.4%", color: "#ff8c00", foto: true },
                    { nombre: "R. López Aliaga", partido: "Renovación Popular", pct: "11.7%", color: "#00bfff", foto: true },
                    { nombre: "Hernando de Soto", partido: "Avanza País", pct: "11.6%", color: "#e91e63", foto: false }
                ]
            },
            "2021 - 2da Vuelta": {
                mapa: {
                    "AMAZONAS": "#ce1126", "ANCASH": "#ce1126", "APURIMAC": "#ce1126", "AREQUIPA": "#ce1126",
                    "AYACUCHO": "#ce1126", "CAJAMARCA": "#ce1126", "CUSCO": "#ce1126", "HUANCAVELICA": "#ce1126",
                    "HUANUCO": "#ce1126", "ICA": "#ff8c00", "JUNIN": "#ce1126", "LA LIBERTAD": "#ff8c00",
                    "LAMBAYEQUE": "#ff8c00", "LIMA": "#ff8c00", "LORETO": "#ff8c00", "MADRE DE DIOS": "#ce1126",
                    "MOQUEGUA": "#ce1126", "PASCO": "#ce1126", "PIURA": "#ff8c00", "PUNO": "#ce1126",
                    "SAN MARTIN": "#ce1126", "TACNA": "#ce1126", "TUMBES": "#ff8c00", "CALLAO": "#ff8c00",
                    "UCAYALI": "#ff8c00", "EXTRANJERO": "#ff8c00"
                },
                top: [
                    { nombre: "Pedro Castillo", partido: "Perú Libre", pct: "50.1%", color: "#ce1126", foto: true },
                    { nombre: "Keiko Fujimori", partido: "Fuerza Popular", pct: "49.8%", color: "#ff8c00", foto: true }
                ]
            }
        };

        const periodos = Object.keys(elecciones);
        let currentIndex = 0;
        let geoJsonLayer, callaoInset, pexLayer;

        function getStyle(name) {
            let n = name ? name.toUpperCase().trim() : "";
            let anio = periodos[currentIndex];
            return {
                fillColor: elecciones[anio].mapa[n] || "#eeeeee",
                weight: 0.8, opacity: 1, color: "#444444", fillOpacity: 1
            };
        }

        function updateTopLegend() {
            const anio = periodos[currentIndex];
            const candidatos = elecciones[anio].top;
            const container = document.getElementById("top-legend");
            container.innerHTML = "";

            candidatos.forEach(cand => {
                const card = document.createElement("div");
                card.className = "candidate-card";
                
                // Mostrar círculo solo si tiene 'foto: true'
                const photoHtml = cand.foto ? `<div class="photo-circle"></div>` : `<div style="width:12px"></div>`;
                
                card.innerHTML = `
                    ${photoHtml}
                    <div class="candidate-info">
                        <span class="candidate-name">${cand.nombre}</span>
                        <span class="party-name">${cand.party || cand.partido}</span>
                        <div class="percentage-box">
                            <div class="color-dot" style="background: ${cand.color}"></div>
                            <span class="percentage">${cand.pct}</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        fetch("mapa.geojson?v=" + Date.now())
            .then(res => res.json())
            .then(data => {
                geoJsonLayer = L.geoJSON(data, {
                    style: f => getStyle(f.properties.NOMBDEP),
                    onEachFeature: (f, l) => { l.bindPopup("<b>" + f.properties.NOMBDEP + "</b>"); }
                }).addTo(map);

                let callaoF = data.features.find(f => f.properties.NOMBDEP === "CALLAO");
                if (callaoF) {
                    let callaoGeom = JSON.parse(JSON.stringify(callaoF.geometry));
                    const shift = [-81.9, -11.5], scale = 12, center = [-77.12, -12.05];
                    function transform(coords) {
                        if (Array.isArray(coords[0])) return coords.map(transform);
                        return [shift[0] + (coords[0] - center[0]) * scale, shift[1] + (coords[1] - center[1]) * scale];
                    }
                    callaoGeom.coordinates = transform(callaoGeom.coordinates);
                    callaoInset = L.geoJSON(callaoGeom, { style: getStyle("CALLAO") }).addTo(map);
                    L.polyline([[-10.4, -81.5], [-12.05, -77.12]], { color: "#444", weight: 1.2, dashArray: "5, 5" }).addTo(map);
                }

                pexLayer = L.rectangle([[-16, -83.5], [-14.5, -79.5]], getStyle("EXTRANJERO")).addTo(map);
                var pexLabelIcon = L.divIcon({ 
                    className: 'pex-label', 
                    html: 'Peruanos en el extranjero', 
                    iconSize: [160, 20], 
                    iconAnchor: [80, 10] 
                });
                L.marker([-14.1, -81.5], { icon: pexLabelIcon, interactive: false }).addTo(map);

                updateTopLegend();
                document.getElementById("year-display").innerText = periodos[currentIndex];

                setInterval(() => {
                    currentIndex = (currentIndex + 1) % periodos.length;
                    geoJsonLayer.setStyle(f => getStyle(f.properties.NOMBDEP));
                    if (callaoInset) callaoInset.setStyle(getStyle("CALLAO"));
                    if (pexLayer) pexLayer.setStyle(getStyle("EXTRANJERO"));
                    document.getElementById("year-display").innerText = periodos[currentIndex];
                    updateTopLegend();
                }, 3000);
            });
    </script>
</body>
</html>
