<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Electoral Perú - ECData</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* Fondo blanco total */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            overflow: hidden; 
            background-color: #ffffff; 
        }
        #map { 
            width: 100%; 
            height: 100vh; 
            background-color: #ffffff; /* Asegura que el contenedor sea blanco */
        }

        /* Etiqueta flotante */
        .year-label {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: white;
            padding: 8px 16px;
            border: 1px solid #000;
            font-family: Arial, sans-serif;
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>

    <div id="year-display" class="year-label">1ra Vuelta 2011</div>
    <div id="map"></div>

    <script>
        // 1. CONFIGURACIÓN DEL MAPA FIJO
        var map = L.map('map', {
            zoomControl: false,
            dragging: false,
            scrollWheelZoom: false,
            doubleClickZoom: false,
            touchZoom: false,
            attributionControl: false // Quitamos los créditos de Leaflet para limpieza total
        }).setView([-9.19, -75.01], 5); // Vista wide de Perú

        // NOTA: HEMOS ELIMINADO L.tileLayer PARA QUE NO SE VEAN OTROS PAÍSES

        // 2. DATOS DE LAS ELECCIONES
        const elecciones = {
            "2011": { "LIMA": "#ff8c00", "CUSCO": "#ce1126", "PIURA": "#ff8c00", "LORETO": "#ce1126" },
            "2016": { "LIMA": "#ff8c00", "CUSCO": "#ffcc00", "PIURA": "#ff8c00", "LORETO": "#ff8c00" },
            "2021": { "LIMA": "#0047ab", "CUSCO": "#ce1126", "PIURA": "#ff8c00", "LORETO": "#ce1126" }
        };

        const periodos = ["2011", "2016", "2021"];
        let currentIndex = 0;
        let geoJsonLayer;

        function getStyle(feature) {
            let año = periodos[currentIndex];
            let nombreDpto = feature.properties.NOMBDEP || feature.properties.NOMBDIST; 
            
            return {
                fillColor: elecciones[año][nombreDpto] || "#eeeeee", // Gris muy claro si no hay dato
                weight: 1.5,      // Grosor del borde
                opacity: 1,
                color: '#ffffff', // Bordes blancos entre departamentos
                fillOpacity: 1    // Color sólido
            };
        }

        // 3. CARGA DEL GEOJSON
        fetch('mapa.geojson')
            .then(response => response.json())
            .then(data => {
                geoJsonLayer = L.geoJSON(data, {
                    style: getStyle
                }).addTo(map);

                // ANIMACIÓN CADA 2 SEGUNDOS
                setInterval(() => {
                    currentIndex = (currentIndex + 1) % periodos.length;
                    geoJsonLayer.setStyle(getStyle);
                    document.getElementById('year-display').innerText = `1ra Vuelta ${periodos[currentIndex]}`;
                }, 2000);
            });
    </script>
</body>
</html>
