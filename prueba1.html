<!DOCTYPE html>
<html>
<head>
    <title>Mapa GeoJSON - ECData</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 100vh; width: 100%; margin: 0; padding: 0; }
        .info { padding: 6px 8px; font: 14px/16px Arial, Helvetica, sans-serif; background: white; background: rgba(255,255,255,0.8); box-shadow: 0 0 15px rgba(0,0,0,0.2); border-radius: 5px; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        // Centramos el mapa en Perú
        var map = L.map('map').setView([-9.19, -75.01], 6);

        // Capa base (puedes usar una de MapBox o CartoDB)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // CARGAR TU GEOJSON
        // Asegúrate de que el archivo se llame 'mapa.geojson' y esté en el mismo repo
        fetch('mapa.geojson')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: function(feature) {
                        return {
                            fillColor: "#ce1126",
                            weight: 1,
                            opacity: 1,
                            color: 'white',
                            fillOpacity: 0.7
                        };
                    },
                    onEachFeature: function (feature, layer) {
                        // Si en R le pusiste nombres a las columnas, úsalas aquí
                        layer.bindPopup("Distrito: " + (feature.properties.NOMBDIST || "Sin nombre"));
                        
                        layer.on('mouseover', function (e) {
                            this.setStyle({ fillOpacity: 1, weight: 2 });
                        });
                        layer.on('mouseout', function (e) {
                            this.setStyle({ fillOpacity: 0.7, weight: 1 });
                        });
                    }
                }).addTo(map);
            });
    </script>
</body>
</html>
